spring.application.name=events

#ConfigurańŃo para Postgres
#spring.datasource.url=jdbc:postgresql://localhost:5432/db_events
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}
#spring.jpa.hibernate.ddl-auto=none

#ConfigurańŃo para DB Maria
spring.datasource.url=jdbc:mariadb://localhost:3305/db_events
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

#ConfigurańŃo para MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/db_events
spring.datasource.username=${DB_MYSQL_USERNAME}
spring.datasource.password=${DB_MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.ignoreUnsupportedDatabase=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.auth0.jwt=DEBUG